<!DOCTYPE html><html lang="en" data-theme="auto"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0c1116"><title>PockeTech — Field Guide</title>
<style>
:root{--bg:#f6f8fc;--fg:#0c1116;--muted:#5a6572;--tile:#ffffff;--border:#d6dbe3;--accent:#1f6bff;--radius:18px}
html[data-theme=dark]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--tile:#151922;--border:#2a2f3a;--accent:#3a7afe}
@media(prefers-color-scheme:dark){html[data-theme=auto]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--tile:#151922;--border:#2a2f3a;--accent:#3a7afe}}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top,var(--tile),var(--bg) 42%);color:var(--fg);min-height:100vh}
header{background:rgba(255,255,255,.72);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:calc(10px + env(safe-area-inset-top)) 12px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
html[data-theme=dark] header{background:rgba(15,17,21,.75)}
@media(prefers-color-scheme:dark){html[data-theme=auto] header{background:rgba(15,17,21,.75)}}
.theme-btn{cursor:pointer;border:1px solid var(--border);background:var(--tile);color:var(--fg);padding:8px 10px;font-size:14px;border-radius:12px;font:inherit}
.theme-btn:active{transform:scale(.97)}
main{padding:14px;max-width:960px;margin:auto}
.hero{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 20%,var(--tile)),var(--tile) 70%);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.title{font-size:26px;font-weight:800}
.subtitle{margin-top:6px;color:var(--muted)}
.list{display:flex;flex-direction:column;gap:12px}
.item{display:flex;align-items:center;justify-content:space-between;padding:18px;border-radius:18px;background:var(--tile);border:1px solid var(--border);text-decoration:none;color:var(--fg);font-size:18px;box-shadow:0 4px 10px rgba(0,0,0,0.04)}
.item:active{transform:scale(0.97)}
.left{display:flex;align-items:center;gap:12px}
.arrow{color:var(--muted);font-size:20px}
.back{margin-top:16px;padding:16px;border-radius:18px;background:var(--tile);border:1px solid var(--border);text-align:center;font-weight:600;cursor:pointer;margin-bottom:14px}
.back:active{transform:scale(.98)}
</style>
</head>
