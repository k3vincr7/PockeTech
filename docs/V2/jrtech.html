<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>PockeTech — Field Guide</title>

<style>
:root{--bg:#f6f8fc;--fg:#0c1116;--muted:#5a6572;--card:#fff;--tile:#eef2f7;--border:#d6dbe3;--accent:#1f6bff}
html[data-theme="dark"]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--card:#151922;--tile:#202838;--border:#2a2f3a;--accent:#3a7afe}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:var(--bg);color:var(--fg)}
main{padding:14px;max-width:900px;margin:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px}
.title{font-size:20px;font-weight:800}
.subtitle{color:var(--muted);margin-top:4px}
.list{display:flex;flex-direction:column;gap:10px}
.item{display:flex;align-items:center;justify-content:space-between;padding:16px;border-radius:16px;background:var(--tile);border:1px solid var(--border);text-decoration:none;color:var(--fg);transition:all .12s ease}
.item:active{transform:scale(.98)}
.left{display:flex;align-items:center;gap:12px;font-weight:600;font-size:16px}
.icon{font-size:20px}
.arrow{font-size:18px;color:var(--muted)}
button{width:100%;padding:14px;border-radius:16px;border:1px solid var(--border);background:var(--tile);color:var(--fg);font-weight:600}
</style>
</head>
