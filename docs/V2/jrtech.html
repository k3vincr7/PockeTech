<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PockeTech — Field Guide</title>

<style>
:root{
  --bg:#0f1115;
  --fg:#e8e8e8;
  --muted:#a0a0a0;
  --card:#151922;
  --tile:#202838;
  --border:#2a2f3a;
  --radius:18px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--fg);
}

main{
  padding:14px;
  max-width:960px;
  margin:auto;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
}

.title{
  font-size:22px;
  font-weight:800;
}

.subtitle{
  color:var(--muted);
  margin-top:4px;
  font-size:14px;
}

.list{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:10px;
}

.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px;
  border-radius:16px;
  background:var(--tile);
  border:1px solid var(--border);
  text-decoration:none;
  color:var(--fg);
  font-size:16px;
}

.item:active{
  transform:scale(0.98);
}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.arrow{
  color:var(--muted);
  font-size:18px;
}

button{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--tile);
  color:var(--fg);
  font-weight:600;
}
</style>
</head>

<body>

<main>

<div class="card">
  <div class="title">📚 Field Guide</div>
  <div class="subtitle">Quick learning for real field situations</div>
</div>

<div class="card">
  <div class="list">

    <a class="item" href="./jr-420.html">
      <div class="left">📈 4–20 mA Basics</div>
      <div class="arrow">›</div>
    </a>

    <a class="item" href="./jr-control-valve.html">
      <div class="left">⚙️ Control Valve (AO)</div>
      <div class="arrow">›</div>
    </a>

    <a class="item" href="#">
      <div class="left">🫙 Level (Coming Soon)</div>
      <div class="arrow">›</div>
    </a>

    <a class="item" href="#">
      <div class="left">🔥 Temperature (Coming Soon)</div>
      <div class="arrow">›</div>
    </a>

    <a class="item" href="#">
      <div class="left">🧪 Pressure (Coming Soon)</div>
      <div class="arrow">›</div>
    </a>

    <a class="item" href="#">
      <div class="left">🚨 Troubleshooting (Coming Soon)</div>
      <div class="arrow">›</div>
    </a>

  </div>
</div>

<div class="card">
  <button onclick="location.href='./index.html'">← Back</button>
</div>

</main>

</body>
</html>
