<!DOCTYPE html><html lang="en" data-theme="auto"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>PockeTech V2 — I/P 3-15</title><meta name="theme-color" content="#0f1115"><style>:root{--bg:#f6f8fc;--fg:#0c1116;--muted:#5a6572;--card:#fff;--tile:#eef2f7;--border:#d6dbe3;--accent:#1f6bff;--ok:#166534;--shadow:0 12px 30px rgba(15,23,42,.10);--radius:18px}html[data-theme=dark]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--card:#151922;--tile:#202838;--border:#2a2f3a;--accent:#3a7afe;--shadow:0 14px 34px rgba(0,0,0,.35)}@media(prefers-color-scheme:dark){html[data-theme=auto]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--card:#151922;--tile:#202838;--border:#2a2f3a;--accent:#3a7afe;--shadow:0 14px 34px rgba(0,0,0,.35)}}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top,var(--tile),var(--bg) 42%);color:var(--fg);min-height:100vh}header{background:rgba(255,255,255,.72);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:calc(10px + env(safe-area-inset-top)) 12px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}html[data-theme=dark] header{background:rgba(15,17,21,.75)}main{padding:14px;max-width:960px;margin:0 auto}.brand{display:flex;flex-direction:column}.title{font-weight:850;font-size:18px}.build,.muted{font-size:13px;color:var(--muted);line-height:1.35}button,input{font:inherit;border-radius:14px}button{cursor:pointer;border:1px solid var(--border);background:var(--tile);color:var(--fg);padding:12px;font-weight:650}button:active{transform:translateY(1px) scale(.99)}input{width:100%;padding:13px;border:1px solid var(--border);background:var(--card);color:var(--fg);margin-top:7px;outline:none}input:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}input[type=range]{accent-color:var(--accent);padding:0;border:none;background:transparent;margin-top:10px}label{font-weight:700;font-size:14px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}.hero{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 18%,var(--card)),var(--card))}.row{display:flex;gap:12px;flex-wrap:wrap}.col{flex:1 1 230px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}.result-card{background:var(--tile);border:1px solid var(--border);border-radius:16px;padding:14px}.big{font-size:28px;font-weight:850;margin:4px 0;letter-spacing:-.4px}.slider-wrap{background:var(--tile);border:1px solid var(--border);border-radius:16px;padding:14px;margin-top:14px}.chipbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.chip{width:auto;border-radius:999px;padding:9px 13px}.ok{background:var(--ok);border-color:var(--ok);color:white}.small-btn{padding:8px 10px;font-size:14px;border-radius:12px;width:auto}.scroll-x{overflow-x:auto}table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px}th,td{border:1px solid var(--border);padding:9px;text-align:left}th{background:var(--tile)}.copy-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.copy-row button{flex:1 1 120px}.note{background:color-mix(in srgb,var(--accent) 10%,var(--tile));border:1px solid color-mix(in srgb,var(--accent) 35%,var(--border));border-radius:14px;padding:12px;color:var(--muted);font-size:13px;line-height:1.35}@media(max-width:520px){main{padding:12px}.card{padding:14px}.big{font-size:24px}}</style></head><body><header><div class="brand"><div class="title">PockeTech V2</div><div class="build">I/P 3–15</div></div><button class="small-btn" onclick="toggleTheme()">🌓</button></header><main><div class="card hero"><h1 style="margin:0 0 6px">I/P 3–15</h1><p class="muted" style="margin:0">Convert 4–20 mA, 3–15 PSI, and percent for I/P converters and valve signal checks.</p></div><div class="card"><div class="row"><div class="col"><label>mA</label><input id="ma" type="text" inputmode="text" placeholder="12"></div><div class="col"><label>PSI</label><input id="psi" type="text" inputmode="text" placeholder="9"></div><div class="col"><label>%</label><input id="pct" type="text" inputmode="text" placeholder="50"></div></div><div class="slider-wrap"><label>Live % Slider</label><input id="slider" type="range" min="0" max="100" step="0.1" value="50"><div class="chipbar"><button class="chip" onclick="setPct(0)">0%</button><button class="chip" onclick="setPct(25)">25%</button><button class="chip" onclick="setPct(50)">50%</button><button class="chip" onclick="setPct(75)">75%</button><button class="chip" onclick="setPct(100)">100%</button></div></div></div><div class="result-grid"><div class="result-card"><div class="muted">Percent</div><div class="big" id="readPct">—</div></div><div class="result-card"><div class="muted">mA</div><div class="big" id="readMA">—</div></div><div class="result-card"><div class="muted">PSI</div><div class="big" id="readPSI">—</div></div></div><div class="card"><h2 style="margin-top:0">Copy Values</h2><div class="copy-row"><button onclick="copyVal('ma')">Copy mA</button><button onclick="copyVal('psi')">Copy PSI</button><button onclick="copyVal('pct')">Copy %</button></div><p class="muted" id="copyMsg" style="margin-bottom:0"></p></div><div class="card"><div class="row"><div class="col"><button class="ok" onclick="buildTable()">Build 5-Point Table</button></div><div class="col"><button onclick="clearAll()">Clear</button></div></div><div class="scroll-x"><table id="steps"><thead><tr><th>%</th><th>mA</th><th>PSI</th></tr></thead><tbody></tbody></table></div></div><div class="card"><div class="note">Standard I/P range: 4 mA = 3 PSI, 20 mA = 15 PSI. Midpoint: 12 mA = 9 PSI = 50%.</div></div><div class="card"><button onclick="location.href='./'">← Back to PockeTech V2</button></div></main><script>const $=id=>document.getElementById(id);let source='pct';function n(id){const raw=$(id).value.trim().replace('−','-');if(raw==='')return null;const x=Number(raw);return Number.isFinite(x)?x:null}function fmt(v,d=3){return Number.isFinite(v)?Number(v).toFixed(d):'—'}function clamp(v){return Math.min(Math.max(v,0),100)}function pctToMA(p){return 4+(p/100)*16}function maToPct(m){return ((m-4)/16)*100}function pctToPSI(p){return 3+(p/100)*12}function psiToPct(p){return ((p-3)/12)*100}function read(p){if(!Number.isFinite(p)){$('readPct').textContent='—';$('readMA').textContent='—';$('readPSI').textContent='—';return}p=clamp(p);$('readPct').textContent=fmt(p,2)+' %';$('readMA').textContent=fmt(pctToMA(p),3)+' mA';$('readPSI').textContent=fmt(pctToPSI(p),3)+' PSI';$('slider').value=p}function writeAll(p){p=clamp(p);$('pct').value=fmt(p,2);$('ma').value=fmt(pctToMA(p),3);$('psi').value=fmt(pctToPSI(p),3);read(p)}function syncPct(w=false){const p=n('pct');if(p===null){read(NaN);return}w?writeAll(p):read(p)}function syncMA(w=false){const m=n('ma');if(m===null){read(NaN);return}const p=clamp(maToPct(m));if(w)writeAll(p);else read(p)}function syncPSI(w=false){const ps=n('psi');if(ps===null){read(NaN);return}const p=clamp(psiToPct(ps));if(w)writeAll(p);else read(p)}function setPct(p){source='pct';$('pct').value=p;writeAll(p)}function buildTable(){const tb=$('steps').querySelector('tbody');tb.innerHTML='';[0,25,50,75,100].forEach(p=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${p}%</td><td>${fmt(pctToMA(p),3)}</td><td>${fmt(pctToPSI(p),3)}</td>`;tb.appendChild(tr)})}function clearAll(){['pct','ma','psi'].forEach(id=>$(id).value='');$('steps').querySelector('tbody').innerHTML='';$('slider').value=50;read(NaN);$('copyMsg').textContent=''}async function copyVal(type){let text='';const p=source==='ma'?clamp(maToPct(n('ma')??NaN)):source==='psi'?clamp(psiToPct(n('psi')??NaN)):clamp(n('pct')??NaN);if(!Number.isFinite(p)){ $('copyMsg').textContent='Nothing to copy yet.'; return }if(type==='ma')text=fmt(pctToMA(p),3)+' mA';if(type==='psi')text=fmt(pctToPSI(p),3)+' PSI';if(type==='pct')text=fmt(p,2)+' %';try{await navigator.clipboard.writeText(text);$('copyMsg').textContent='Copied: '+text}catch{$('copyMsg').textContent=text}}function toggleTheme(){const h=document.documentElement,next=h.getAttribute('data-theme')==='dark'?'auto':'dark';h.setAttribute('data-theme',next);localStorage.setItem('pt-v2-theme',next)}function wire(){$('pct').addEventListener('input',()=>{source='pct';syncPct(false)});$('pct').addEventListener('change',()=>syncPct(true));$('ma').addEventListener('input',()=>{source='ma';syncMA(false)});$('ma').addEventListener('change',()=>syncMA(true));$('psi').addEventListener('input',()=>{source='psi';syncPSI(false)});$('psi').addEventListener('change',()=>syncPSI(true));$('slider').addEventListener('input',()=>{source='pct';$('pct').value=$('slider').value;writeAll(Number($('slider').value))})}(function init(){const t=localStorage.getItem('pt-v2-theme');if(t)document.documentElement.setAttribute('data-theme',t);wire();read(NaN)})();</script></body></html>
