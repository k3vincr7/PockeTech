<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PockeTech V2 — Loop Log</title>
<meta name="theme-color" content="#0f3c78">
<style>
:root{
  --navy:#0f3c78;
  --bg:#eef2f7;
  --card:#fff;
  --border:#dde3ec;
  --muted:#6b7c93;
  --accent:#1f6bff;
  --text:#0d1b2a;
  --shadow:0 2px 10px rgba(0,0,0,.07);
  --radius:14px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}

.site-header{
  background:var(--navy);
  color:white;
  padding:calc(14px + env(safe-area-inset-top)) 16px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:20;
}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{font-size:24px;line-height:1}
.header-title{font-size:20px;font-weight:900;letter-spacing:.4px;line-height:1.15}
.header-sub{font-size:11px;opacity:.72;margin-top:3px;letter-spacing:.2px}
.export-hdr-btn{
  background:transparent;
  border:2px solid rgba(255,255,255,.55);
  color:white;
  border-radius:10px;
  padding:8px 14px;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
  font-family:inherit;
}
.export-hdr-btn:active{opacity:.7}

.container{max-width:900px;margin:0 auto;padding:14px;padding-bottom:90px}

.card{
  background:var(--card);
  border-radius:var(--radius);
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  margin-bottom:14px;
  overflow:hidden;
}
.card-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:13px 16px;
  border-bottom:1px solid var(--border);
}
.card-title{
  font-weight:800;
  font-size:14px;
  letter-spacing:.5px;
  display:flex;
  align-items:center;
  gap:8px;
}
.collapse-btn{
  background:none;
  border:none;
  color:var(--accent);
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  padding:4px 6px;
  border-radius:6px;
  font-family:inherit;
}

.snapshot-body{padding:12px 16px 6px}
.snap-row{
  display:grid;
  grid-template-columns:88px 1fr;
  gap:10px;
  align-items:start;
  margin-bottom:10px;
}
.snap-label{
  font-weight:800;
  font-size:11px;
  letter-spacing:.6px;
  color:var(--muted);
  text-transform:uppercase;
  padding-top:10px;
}
.snap-fields{display:flex;gap:7px;flex-wrap:wrap}
.field-box{
  flex:1;
  min-width:60px;
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 10px;
  background:#f7f9fc;
}
.field-box.wide{min-width:130px}
.field-lbl{
  font-size:10px;
  font-weight:800;
  letter-spacing:.5px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:4px;
}
.field-box input{
  width:100%;
  border:none;
  background:transparent;
  font-size:15px;
  font-weight:600;
  color:var(--text);
  padding:0;
  font-family:inherit;
  outline:none;
}
.field-box input::placeholder{color:#b0bec5}

.form-body{padding:16px}
.form-row-3{
  display:grid;
  grid-template-columns:200px 1fr 1fr;
  gap:10px;
  margin-bottom:12px;
}
.form-row-2{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:10px;
  margin-bottom:14px;
  align-items:end;
}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-lbl{
  font-size:11px;
  font-weight:800;
  letter-spacing:.5px;
  color:var(--muted);
  text-transform:uppercase;
}
.form-input{
  padding:11px 12px;
  border:1px solid var(--border);
  border-radius:10px;
  font-family:inherit;
  font-size:14px;
  color:var(--text);
  background:white;
  width:100%;
  outline:none;
  transition:border-color .15s;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(31,107,255,.12)}
.date-wrap{position:relative}
.date-icon{
  position:absolute;
  left:11px;
  top:50%;
  transform:translateY(-50%);
  font-size:15px;
  pointer-events:none;
  line-height:1;
}
.date-input{padding-left:34px}

.status-group{display:flex;gap:8px}
.status-btn{
  padding:10px 18px;
  border-radius:10px;
  font-weight:900;
  font-size:14px;
  cursor:pointer;
  border:none;
  display:flex;
  align-items:center;
  gap:6px;
  letter-spacing:.3px;
  font-family:inherit;
  opacity:.38;
  transition:opacity .12s,transform .08s;
}
.status-btn.active{opacity:1}
.status-btn:active{transform:scale(.97)}
.pass-btn{background:#28a745;color:white}
.fail-btn{background:#dc3545;color:white}

.add-btn{
  width:100%;
  padding:14px;
  background:var(--navy);
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  letter-spacing:.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-family:inherit;
  transition:opacity .12s;
}
.add-btn:active{opacity:.8}

.log-table-wrap{overflow-x:auto}
.log-table{width:100%;border-collapse:collapse;font-size:14px}
.log-table th{
  background:var(--navy);
  color:white;
  padding:11px 14px;
  text-align:left;
  font-weight:800;
  font-size:11px;
  letter-spacing:.6px;
  text-transform:uppercase;
  white-space:nowrap;
}
.log-table td{
  padding:12px 14px;
  border-bottom:1px solid #f0f4fa;
  vertical-align:middle;
}
.log-table .data-row:last-of-type td{border-bottom:none}
.log-table .data-row:hover{background:#fafcff}

.badge{
  padding:4px 11px;
  border-radius:6px;
  font-weight:800;
  font-size:12px;
  letter-spacing:.5px;
  display:inline-block;
  white-space:nowrap;
}
.badge-pass{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.badge-fail{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}

.actions-cell{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.expand-btn{
  background:none;
  border:1px solid var(--border);
  border-radius:7px;
  color:var(--muted);
  cursor:pointer;
  padding:5px 8px;
  font-size:14px;
  line-height:1;
  font-family:inherit;
  transition:background .1s;
}
.expand-btn:hover{background:var(--bg);color:var(--text)}
.ticket-btn{
  background:none;
  border:1px solid #1f6bff;
  color:#1f6bff;
  border-radius:7px;
  padding:5px 8px;
  cursor:pointer;
  font-size:14px;
  line-height:1;
  font-family:inherit;
  transition:background .1s;
}
.ticket-btn:hover{background:#eef2ff}
.del-btn{
  background:none;
  border:1px solid #f5c6cb;
  color:#dc3545;
  border-radius:7px;
  padding:5px 8px;
  cursor:pointer;
  font-size:14px;
  line-height:1;
  display:flex;
  align-items:center;
  font-family:inherit;
  transition:background .1s;
}
.del-btn:hover{background:#f8d7da}

.expand-row{display:none}
.expand-row.open{display:table-row}
.expand-cell{
  padding:14px 18px !important;
  background:#f4f8ff;
  border-bottom:2px solid #dce8ff !important;
}
.expand-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(155px,1fr));
  gap:16px;
}
.exp-sec-title{
  font-size:10px;
  font-weight:800;
  letter-spacing:.6px;
  color:var(--accent);
  text-transform:uppercase;
  margin-bottom:6px;
}
.exp-item{
  font-size:13px;
  color:var(--muted);
  line-height:1.65;
}
.exp-item b{color:var(--text);font-weight:700}

.empty-row td{
  text-align:center;
  color:var(--muted);
  padding:36px;
  font-size:14px;
}

.footer-bar{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  border-top:1px solid var(--border);
  background:var(--bg);
  position:fixed;
  bottom:0;
  left:0;
  right:0;
}
.footer-btn{
  padding:12px 10px;
  border-radius:10px;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  border:1px solid var(--border);
  background:white;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-family:inherit;
  white-space:nowrap;
}
.footer-btn.danger{color:#dc3545;border-color:#f5c6cb}
.footer-btn:active{opacity:.7}

@media(max-width:640px){
  .form-row-3{grid-template-columns:1fr 1fr}
  .form-row-3 .form-field:first-child{grid-column:1/-1}
  .form-row-2{grid-template-columns:1fr}
  .snap-row{grid-template-columns:70px 1fr}
  .snap-label{font-size:10px}
  .log-table th,.log-table td{padding:10px 10px;font-size:13px}
  .expand-grid{grid-template-columns:1fr 1fr}
  .header-title{font-size:17px}
  .export-hdr-btn{padding:7px 10px;font-size:12px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <span class="header-icon">🔁</span>
    <div>
      <div class="header-title">LOOP LOG</div>
      <div class="header-sub">Field → Wiring → I/O → DCS → Final Element</div>
    </div>
  </div>
  <button class="export-hdr-btn" onclick="exportCSV()">📄 EXPORT</button>
</header>

<div class="container">

  <div class="card">
    <div class="card-header">
      <span class="card-title">📊 DEVICE SNAPSHOT</span>
      <button class="collapse-btn" id="collapseBtn" onclick="toggleSnapshot()">Collapse ∧</button>
    </div>
    <div id="snapshotBody" class="snapshot-body">
      <div class="snap-row">
        <div class="snap-label">RANGE</div>
        <div class="snap-fields">
          <div class="field-box"><div class="field-lbl">LRV</div><input id="s_lrv" type="text" inputmode="decimal" placeholder="0"></div>
          <div class="field-box"><div class="field-lbl">URV</div><input id="s_urv" type="text" inputmode="decimal" placeholder="100"></div>
          <div class="field-box"><div class="field-lbl">EU UNITS</div><input id="s_eu" type="text" placeholder="%"></div>
        </div>
      </div>
      <div class="snap-row">
        <div class="snap-label">ALARMS</div>
        <div class="snap-fields">
          <div class="field-box"><div class="field-lbl">LLL</div><input id="s_lll" type="text" inputmode="decimal" placeholder=""></div>
          <div class="field-box"><div class="field-lbl">LL</div><input id="s_ll" type="text" inputmode="decimal" placeholder=""></div>
          <div class="field-box"><div class="field-lbl">L</div><input id="s_l" type="text" inputmode="decimal" placeholder=""></div>
          <div class="field-box"><div class="field-lbl">H</div><input id="s_h" type="text" inputmode="decimal" placeholder=""></div>
          <div class="field-box"><div class="field-lbl">HH</div><input id="s_hh" type="text" inputmode="decimal" placeholder=""></div>
          <div class="field-box"><div class="field-lbl">HHH</div><input id="s_hhh" type="text" inputmode="decimal" placeholder=""></div>
        </div>
      </div>
      <div class="snap-row">
        <div class="snap-label">DEVICE INFO</div>
        <div class="snap-fields">
          <div class="field-box wide"><div class="field-lbl">DEVICE RANGE</div><input id="s_range" type="text" placeholder="0 - 100 %"></div>
          <div class="field-box"><div class="field-lbl">SERIAL #</div><input id="s_serial" type="text" placeholder=""></div>
          <div class="field-box"><div class="field-lbl">MODEL #</div><input id="s_model" type="text" placeholder=""></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">➕ ADD ENTRY</span>
    </div>
    <div class="form-body">
      <div class="form-row-3">
        <div class="form-field">
          <label class="form-lbl">DATE</label>
          <div class="date-wrap">
            <span class="date-icon">📅</span>
            <input class="form-input date-input" id="e_date" type="date">
          </div>
        </div>
        <div class="form-field">
          <label class="form-lbl">TAG</label>
          <input class="form-input" id="e_tag" type="text" placeholder="Enter Tag">
        </div>
        <div class="form-field">
          <label class="form-lbl">POINT</label>
          <input class="form-input" id="e_point" type="text" placeholder="Enter Point">
        </div>
      </div>
      <div class="form-row-2">
        <div class="form-field">
          <label class="form-lbl">STATUS</label>
          <div class="status-group">
            <button class="status-btn pass-btn active" id="passBtn" onclick="setStatus('PASS')">✅ PASS</button>
            <button class="status-btn fail-btn" id="failBtn" onclick="setStatus('FAIL')">❌ FAIL</button>
          </div>
        </div>
        <div class="form-field">
          <label class="form-lbl">NOTES</label>
          <input class="form-input" id="e_notes" type="text" placeholder="Enter notes (optional)">
        </div>
      </div>
      <button class="add-btn" onclick="addEntry()">+ ADD TO LOG</button>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">📋 LOOP LOG</span>
    </div>
    <div class="log-table-wrap">
      <table class="log-table">
        <thead>
          <tr>
            <th>DATE</th>
            <th>TAG</th>
            <th>POINT</th>
            <th>STATUS</th>
            <th>NOTES</th>
            <th>ACTIONS</th>
          </tr>
        </thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footer-bar">
  <button class="footer-btn danger" onclick="clearAll()">🗑 CLEAR ALL</button>
  <button class="footer-btn" onclick="exportCSV()">📄 EXPORT CSV</button>
  <button class="footer-btn" onclick="location.href='./'">← BACK</button>
</div>

<script>
const $ = id => document.getElementById(id);
(function(){var t=localStorage.getItem('pt-v2-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
(function(){var sx,sy;document.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});document.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx,dy=Math.abs(e.changedTouches[0].clientY-sy);if(sx<60&&dx>50&&dy<100)history.back();},{passive:true});})();
</script>

<script>
const STORE = 'pt-v2-looplog-v2';
let logs = [];
let currentStatus = 'PASS';
let snapshotOpen = true;
const expandedRows = new Set();

try { logs = JSON.parse(localStorage.getItem(STORE) || '[]'); } catch { logs = []; }

(function() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  $('e_date').value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
})();

function setStatus(s) {
  currentStatus = s;
  $('passBtn').classList.toggle('active', s === 'PASS');
  $('failBtn').classList.toggle('active', s === 'FAIL');
}

function getSnapshot() {
  return {
    lrv: $('s_lrv').value.trim(), urv: $('s_urv').value.trim(), eu: $('s_eu').value.trim(),
    lll: $('s_lll').value.trim(), ll: $('s_ll').value.trim(), l: $('s_l').value.trim(),
    h: $('s_h').value.trim(), hh: $('s_hh').value.trim(), hhh: $('s_hhh').value.trim(),
    range: $('s_range').value.trim(), serial: $('s_serial').value.trim(), model: $('s_model').value.trim()
  };
}

function addEntry() {
  const tag = $('e_tag').value.trim();
  if (!tag) { $('e_tag').focus(); $('e_tag').style.borderColor='#dc3545'; return; }
  $('e_tag').style.borderColor = '';
  logs.push({
    date: $('e_date').value, tag,
    point: $('e_point').value.trim(),
    status: currentStatus,
    notes: $('e_notes').value.trim(),
    snapshot: getSnapshot()
  });
  save(); render();
  $('e_tag').value = ''; $('e_point').value = ''; $('e_notes').value = '';
  setStatus('PASS');
}

function save() { localStorage.setItem(STORE, JSON.stringify(logs)); }

function del(i) {
  logs.splice(i, 1);
  expandedRows.delete(i);
  const shifted = new Set();
  expandedRows.forEach(idx => shifted.add(idx > i ? idx - 1 : idx));
  expandedRows.clear();
  shifted.forEach(idx => expandedRows.add(idx));
  save(); render();
}

function clearAll() {
  if (!confirm('Clear all log entries? This cannot be undone.')) return;
  logs = []; expandedRows.clear(); save(); render();
}

function toggleRow(i) {
  if (expandedRows.has(i)) expandedRows.delete(i);
  else expandedRows.add(i);
  render();
}

function toggleSnapshot() {
  snapshotOpen = !snapshotOpen;
  $('snapshotBody').style.display = snapshotOpen ? '' : 'none';
  $('collapseBtn').textContent = snapshotOpen ? 'Collapse ∧' : 'Expand ∨';
}

function fmtDate(d) {
  if (!d) return '—';
  const [y, m, day] = d.split('-');
  return `${m}/${day}/${y}`;
}

function v(x) { return x || '—'; }

function flagTicket(i) {
  const r = logs[i];
  const url = './tickets.html?tag=' + encodeURIComponent(r.tag) +
    '&source=loop' +
    '&area=' + encodeURIComponent(r.point || '') +
    '&summary=' + encodeURIComponent('FAIL — ' + r.tag + (r.notes ? ' — ' + r.notes : ''));
  location.href = url;
}

function render() {
  const tb = $('logBody');
  tb.innerHTML = '';

  if (!logs.length) {
    tb.innerHTML = '<tr class="empty-row"><td colspan="6">No entries yet — add one above.</td></tr>';
    return;
  }

  logs.forEach((r, i) => {
    const isOpen = expandedRows.has(i);
    const s = r.snapshot || {};

    const dataRow = document.createElement('tr');
    dataRow.className = 'data-row';
    dataRow.innerHTML = `
      <td style="white-space:nowrap">${fmtDate(r.date)}</td>
      <td><b>${r.tag}</b></td>
      <td>${r.point || '—'}</td>
      <td><span class="badge ${r.status === 'PASS' ? 'badge-pass' : 'badge-fail'}">${r.status}</span></td>
      <td style="color:var(--muted)">${r.notes || ''}</td>
      <td>
        <div class="actions-cell">
          <button class="expand-btn" onclick="toggleRow(${i})" title="${isOpen ? 'Collapse' : 'Expand'}">${isOpen ? '∧' : '∨'}</button>
          ${r.status === 'FAIL' ? `<button class="ticket-btn" onclick="flagTicket(${i})" title="Flag Ticket">🎫</button>` : ''}
          <button class="del-btn" onclick="del(${i})" title="Delete">🗑</button>
        </div>
      </td>`;
    tb.appendChild(dataRow);

    const expandRow = document.createElement('tr');
    expandRow.className = 'expand-row' + (isOpen ? ' open' : '');
    expandRow.innerHTML = `
      <td class="expand-cell" colspan="6">
        <div class="expand-grid">
          <div>
            <div class="exp-sec-title">RANGE</div>
            <div class="exp-item">LRV: <b>${v(s.lrv)}</b></div>
            <div class="exp-item">URV: <b>${v(s.urv)}</b></div>
            <div class="exp-item">EU Units: <b>${v(s.eu)}</b></div>
          </div>
          <div>
            <div class="exp-sec-title">ALARMS</div>
            <div class="exp-item">LLL: <b>${v(s.lll)}</b> &nbsp; H: <b>${v(s.h)}</b></div>
            <div class="exp-item">LL: <b>${v(s.ll)}</b> &nbsp;&nbsp; HH: <b>${v(s.hh)}</b></div>
            <div class="exp-item">L: <b>${v(s.l)}</b> &nbsp;&nbsp;&nbsp; HHH: <b>${v(s.hhh)}</b></div>
          </div>
          <div>
            <div class="exp-sec-title">DEVICE INFO</div>
            <div class="exp-item">Device Range: <b>${v(s.range)}</b></div>
            <div class="exp-item">Serial #: <b>${v(s.serial)}</b></div>
            <div class="exp-item">Model #: <b>${v(s.model)}</b></div>
          </div>
          <div>
            <div class="exp-sec-title">NOTES</div>
            <div class="exp-item"><b>${r.notes || '—'}</b></div>
          </div>
        </div>
      </td>`;
    tb.appendChild(expandRow);
  });
}

function exportCSV() {
  if (!logs.length) { alert('No entries to export.'); return; }
  const headers = ['Date','Tag','Point','Status','Notes','LRV','URV','EU','LLL','LL','L','H','HH','HHH','Device Range','Serial #','Model #'];
  const rows = logs.map(r => {
    const s = r.snapshot || {};
    return [r.date, r.tag, r.point, r.status, r.notes,
            s.lrv, s.urv, s.eu, s.lll, s.ll, s.l, s.h, s.hh, s.hhh,
            s.range, s.serial, s.model]
      .map(val => `"${(val || '').replace(/"/g, '""')}"`)
      .join(',');
  });
  const csv = [headers.join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `loop-log-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

render();
</script>

</body>
