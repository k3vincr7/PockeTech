<!-- Loop Log -->
<section id="loop" style="padding:14px;max-width:900px;margin:auto;">

<h2>🔁 Loop Check Log</h2>

<!-- ===== QUICK CALC ===== -->
<div class="card">
<h3>⚡ 4–20 mA Quick Calc</h3>

<div class="row" style="gap:10px;">
  <input id="ll_lrv" placeholder="LRV">
  <input id="ll_urv" placeholder="URV">
</div>

<div class="row" style="gap:10px;margin-top:8px;">
  <input id="ll_pct" placeholder="%">
  <input id="ll_ma" placeholder="mA">
  <input id="ll_eu" placeholder="EU">
</div>

<div class="row" style="gap:10px;margin-top:8px;">
  <button class="btn" onclick="ll_from_pct()">From %</button>
  <button class="btn" onclick="ll_from_ma()">From mA</button>
</div>

<div class="row" style="gap:6px;margin-top:8px;">
  <button class="btn ll_step" onclick="ll_step(0)">0%</button>
  <button class="btn ll_step" onclick="ll_step(25)">25%</button>
  <button class="btn ll_step" onclick="ll_step(50)">50%</button>
  <button class="btn ll_step" onclick="ll_step(75)">75%</button>
  <button class="btn ll_step" onclick="ll_step(100)">100%</button>
</div>

</div>

<!-- ===== RANGE SNAPSHOT ===== -->
<div class="card">
<h3>📊 Range & Device Snapshot</h3>

<div class="row">
  <input id="lp_lrv" placeholder="LRV">
  <input id="lp_urv" placeholder="URV">
  <input id="lp_eu_units" placeholder="EU Units">
</div>

<div class="row">
  <input id="lp_lll" placeholder="LLL">
  <input id="lp_ll" placeholder="LL">
  <input id="lp_l" placeholder="L">
</div>

<div class="row">
  <input id="lp_h" placeholder="H">
  <input id="lp_hh" placeholder="HH">
  <input id="lp_hhh" placeholder="HHH">
</div>

<div class="row">
  <input id="lp_dev" placeholder="Device Range">
  <input id="lp_dev_sn" placeholder="Serial #">
  <input id="lp_dev_model" placeholder="Model">
</div>

</div>

<!-- ===== ENTRY ===== -->
<div class="card">
<h3>Add Loop Entry</h3>

<div class="row">
  <input id="lp_date" type="date">
  <input id="lp_tag" placeholder="Tag">
  <input id="lp_point" placeholder="Point">
</div>

<div class="row">
  <select id="lp_units">
    <option>%</option><option>mA</option><option>psi</option><option>°F</option>
  </select>

  <select id="lp_ok">
    <option value="YES">PASS</option>
    <option value="NO">FAIL</option>
  </select>

  <input id="lp_notes" placeholder="Notes">
</div>

<div class="row">
  <button class="btn ok" onclick="loop_add()">+ Add</button>
  <button class="btn" onclick="loop_csv()">Export</button>
  <button class="btn danger" onclick="loop_clear()">Clear</button>
</div>

<div>
  <span id="loop-pass">Pass: 0</span>
  <span id="loop-fail" style="margin-left:10px;">Fail: 0</span>
</div>

</div>

<!-- ===== TABLE ===== -->
<div class="card">
<table id="lp_tbl" style="width:100%;font-size:13px;">
<thead>
<tr>
<th>Date</th><th>Tag</th><th>Point</th><th>Units</th><th>Status</th><th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</section>

<script>

/* ===== STORAGE ===== /
const K_LOOP = "loopLogs";

function load(k){ return JSON.parse(localStorage.getItem(k)||"[]"); }
function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

/ ===== CALC ===== */
function ll_from_pct(){
  let p = parseFloat(ll_pct.value);
  if(isNaN(p)) return;
  ll_ma.value = (4 + (p/100)*16).toFixed(2);
}

function ll_from_ma(){
  let m = parseFloat(ll_ma.value);
  if(isNaN(m)) return;
  ll_pct.value = (((m-4)/16)100).toFixed(1);
}

function ll_step(p){
  ll_pct.value = p;
  ll_from_pct();
}

/ ===== LOOP LOG ===== /
function loop_add(){

  const rec = {
    date: lp_date.value || new Date().toISOString().slice(0,10),
    tag: lp_tag.value,
    point: lp_point.value,
    units: lp_units.value,
    ok: lp_ok.value,
    notes: lp_notes.value,

    lrv: lp_lrv.value,
    urv: lp_urv.value,
    devRange: lp_dev.value,
    devSerial: lp_dev_sn.value,
    devModel: lp_dev_model.value
  };

  if(!rec.tag){
    alert("Enter Tag");
    return;
  }

  const rows = load(K_LOOP);
  rows.push(rec);
  save(K_LOOP, rows);

  loop_render();
}

/ ===== RENDER ===== /
function loop_render(){
  const rows = load(K_LOOP);
  const tb = document.querySelector('#lp_tbl tbody');
  tb.innerHTML='';

  let pass=0, fail=0;

  rows.forEach((r,i)=>{
    const tr=document.createElement('tr');

    tr.innerHTML=       <td>${r.date}</td>       <td>${r.tag}</td>       <td>${r.point}</td>       <td>${r.units}</td>       <td>${r.ok}</td>       <td>         <button onclick="loop_delete(${i})">✖</button>       </td>;

    tb.appendChild(tr);

    if(r.ok==="YES") pass++; else fail++;
  });

  loop-pass.textContent="Pass: "+pass;
  loop-fail.textContent="Fail: "+fail;
}

/ ===== DELETE ===== /
function loop_delete(i){
  const rows=load(K_LOOP);
  rows.splice(i,1);
  save(K_LOOP,rows);
  loop_render();
}

/ ===== CLEAR ===== /
function loop_clear(){
  if(confirm("Clear all?")){
    save(K_LOOP,[]);
    loop_render();
  }
}

/ ===== CSV ===== */
function loop_csv(){
  const rows=load(K_LOOP);

  let csv="Date,Tag,Point,Units,Status,Notes\n";

  rows.forEach(r=>{
    csv+=${r.date},${r.tag},${r.point},${r.units},${r.ok},${r.notes}\n;
  });

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="loop_log.csv";
  a.click();
}

loop_render();

</script>
