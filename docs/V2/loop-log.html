<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Log</title>

<style>
/* FORCE RESET (fix your app conflicts) */
{
  box-sizing:border-box;
}

/ PAGE /
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f6f8fc;
  color:#0c1116;
}

main{
  padding:14px;
  max-width:600px;
  margin:auto;
}

/ SECTION /
.section{
  background:#fff;
  border:1px solid #d6dbe3;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}

/ TITLE /
.title{
  font-size:18px;
  font-weight:700;
}

/ NOTE /
.note{
  font-size:13px;
  color:#666;
  margin-top:6px;
}

/ GRID (FIXED) */
.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.row > {
  flex:1;
}

/ INPUTS /
input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d6dbe3;
  font-size:14px;
}

/ BUTTONS /
.btn{
  background:#2d6cdf;
  color:white;
  border:none;
  border-radius:12px;
  padding:12px;
  font-weight:600;
  width:100%;
}

.btn.secondary{
  background:#e5e9f2;
  color:#000;
}

/ STEP BUTTONS /
.steps{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.steps button{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#2d6cdf;
  color:white;
}

/ TABLE /
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  border-bottom:1px solid #eee;
  padding:6px;
  font-size:12px;
  text-align:left;
}

/ BACK /
.back{
  text-align:center;
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<main>

<div class="section">
  <div class="title">🔁 Loop Log</div>
  <div class="note">Field → Wiring → I/O → DCS → Final Element</div>
</div>

<!-- CALC -->
<div class="section">
  <div class="title">⚡ 4–20 mA Quick Calc</div>

  <div class="row">
    <input id="lrv" placeholder="LRV">
    <input id="urv" placeholder="URV">
  </div>

  <div class="row">
    <input id="pct" placeholder="%">
    <input id="ma" placeholder="mA">
  </div>

  <div class="steps">
    <button onclick="step(0)">0%</button>
    <button onclick="step(25)">25%</button>
    <button onclick="step(50)">50%</button>
    <button onclick="step(75)">75%</button>
    <button onclick="step(100)">100%</button>
  </div>

</div>

<!-- ENTRY -->
<div class="section">

<input id="date" type="date">
<input id="tag" placeholder="Tag (PT-101)">

<div class="row">
  <input id="output" placeholder="Output (what you send)">
  <input id="indicated" placeholder="Indicated (what system reads)">
</div>

<select id="status">
  <option>PASS</option>
  <option>FAIL</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>

<div class="row">
  <button class="btn" onclick="addEntry()">+ Add Entry</button>
  <button class="btn secondary" onclick="clearAll()">Clear</button>
</div>

</div>

<!-- TABLE -->
<div class="section">
<table>
<thead>
<tr>
<th>Date</th>
<th>Tag</th>
<th>Out</th>
<th>Ind</th>
<th>Status</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>
</div>

<div class="back" onclick="location.href='./index.html'">
← Back
</div>

</main>

<script>

document.getElementById("date").valueAsDate = new Date();

let logs = JSON.parse(localStorage.getItem("loopLogs") || "[]");

function save(){
  localStorage.setItem("loopLogs", JSON.stringify(logs));
}

function render(){
  const table = document.getElementById("log");
  table.innerHTML = "";

  logs.forEach(l=>{
    table.innerHTML +=      <tr>       <td>${l.date}</td>       <td>${l.tag}</td>       <td>${l.output}</td>       <td>${l.indicated}</td>       <td>${l.status}</td>     </tr>;
  });
}

function addEntry(){
  const entry = {
    date: date.value,
    tag: tag.value,
    output: output.value,
    indicated: indicated.value,
    status: status.value
  };

  if(!entry.tag){
    alert("Enter tag");
    return;
  }

  logs.push(entry);
  save();
  render();

  tag.value="";
  output.value="";
  indicated.value="";
  notes.value="";
}

/ CALC */

function step(p){
  pct.value = p;
  const m = 4 + (p/100)*16;
  ma.value = m.toFixed(2);

  output.value = m.toFixed(2) + " mA";
  indicated.value = p + " %";
}

function clearAll(){
  logs=[];
  save();
  render();
}

render();

</script>

</body>
</html>
