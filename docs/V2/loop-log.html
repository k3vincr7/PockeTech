<script>

const K_LOOP = "loopLogs";

function load(){ return JSON.parse(localStorage.getItem(K_LOOP)||"[]"); }
function save(v){ localStorage.setItem(K_LOOP, JSON.stringify(v)); }

/* ===== ADD ===== */
function loop_add(){

  const rec = {
    date: document.getElementById("lp_date").value || new Date().toISOString().slice(0,10),
    tag: document.getElementById("lp_tag").value,
    point: document.getElementById("lp_point").value,
    units: document.getElementById("lp_units").value,
    ok: document.getElementById("lp_ok").value,
    notes: document.getElementById("lp_notes").value,

    // SNAPSHOT
    lrv: document.getElementById("lp_lrv").value,
    urv: document.getElementById("lp_urv").value,
    eu: document.getElementById("lp_eu_units").value,

    lll: document.getElementById("lp_lll").value,
    ll: document.getElementById("lp_ll").value,
    l: document.getElementById("lp_l").value,
    h: document.getElementById("lp_h").value,
    hh: document.getElementById("lp_hh").value,
    hhh: document.getElementById("lp_hhh").value,

    range: document.getElementById("lp_dev").value,
    serial: document.getElementById("lp_dev_sn").value,
    model: document.getElementById("lp_dev_model").value
  };

  if(!rec.tag){
    alert("Enter tag");
    return;
  }

  const rows = load();
  rows.push(rec);
  save(rows);

  loop_render();

  document.getElementById("lp_notes").value="";
}

/* ===== RENDER ===== */
function loop_render(){

  const rows = load();
  const tb = document.querySelector("#lp_tbl tbody");
  tb.innerHTML="";

  let pass=0, fail=0;

  rows.forEach((r,i)=>{

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${r.date}</td>
      <td>${r.tag}</td>
      <td>${r.point}</td>
      <td>${r.units}</td>
      <td>${r.ok}</td>
      <td>${r.notes}</td>
      <td>
        <button onclick="toggleDetails(${i},this)">▶</button>
        <button onclick="loop_delete(${i})">✖</button>
      </td>
    `;

    tb.appendChild(tr);

    const detail = document.createElement("tr");
    detail.style.display="none";

    detail.innerHTML = `
      <td colspan="7">
        <div style="padding:10px;font-size:13px;">
          <b>Range:</b> ${r.lrv} → ${r.urv} ${r.eu}<br><br>

          <b>Alarms:</b><br>
          LLL:${r.lll} LL:${r.ll} L:${r.l}<br>
          H:${r.h} HH:${r.hh} HHH:${r.hhh}<br><br>

          <b>Device:</b><br>
          Range: ${r.range}<br>
          Serial: ${r.serial}<br>
          Model: ${r.model}
        </div>
      </td>
    `;

    tb.appendChild(detail);

    if(r.ok==="YES") pass++; else fail++;
  });

  document.getElementById("loop-pass").textContent="Pass: "+pass;
  document.getElementById("loop-fail").textContent="Fail: "+fail;
}

/* ===== TOGGLE ===== */
function toggleDetails(i,btn){
  const row = btn.closest("tr").nextElementSibling;
  const open = row.style.display==="table-row";

  row.style.display = open ? "none" : "table-row";
  btn.textContent = open ? "▶" : "▼";
}

/* ===== DELETE ===== */
function loop_delete(i){
  const rows = load();
  rows.splice(i,1);
  save(rows);
  loop_render();
}

/* ===== CLEAR ===== */
function loop_clear(){
  if(confirm("Clear all?")){
    save([]);
    loop_render();
  }
}

/* ===== CSV ===== */
function loop_csv(){

  const rows = load();
  let csv="Date,Tag,Point,Units,Status,Notes,LRV,URV,EU,LLL,LL,L,H,HH,HHH,Range,Serial,Model\n";

  rows.forEach(r=>{
    csv+=`${r.date},${r.tag},${r.point},${r.units},${r.ok},${r.notes},
${r.lrv},${r.urv},${r.eu},
${r.lll},${r.ll},${r.l},${r.h},${r.hh},${r.hhh},
${r.range},${r.serial},${r.model}\n`;
  });

  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="loop_log.csv";
  a.click();
}

/* ===== CONNECT BUTTONS ===== */
document.getElementById("lp_add").onclick = loop_add;
document.getElementById("lp_export").onclick = loop_csv;
document.getElementById("lp_clear").onclick = loop_clear;

/* INIT */
loop_render();

</script>
