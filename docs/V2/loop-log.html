<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PockeTech — Loop Log</title>

<style>
body{margin:0;font-family:-apple-system,Roboto;background:#f6f8fc;}
main{max-width:900px;margin:auto;padding:14px;}
.card{background:#fff;border-radius:16px;padding:14px;margin-bottom:14px;}
.row{display:flex;gap:10px;margin-top:8px;}
.row input,.row select{flex:1;}
input,select{padding:10px;border-radius:10px;border:1px solid #ddd;}
button{padding:10px;border:none;border-radius:10px;background:#2d6cdf;color:white;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:6px;border-bottom:1px solid #eee;}
</style>
</head>

<body>

<main>

<div class="card">
<h2>🔁 Loop Log</h2>
<div>Field → Wiring → I/O → DCS → Final Element</div>
</div>

<!-- SNAPSHOT -->
<div class="card">
<h3>📊 Snapshot</h3>

<div class="row">
<input id="lp_lrv" placeholder="LRV">
<input id="lp_urv" placeholder="URV">
<input id="lp_eu_units" placeholder="EU">
</div>

<div class="row">
<input id="lp_lll" placeholder="LLL">
<input id="lp_ll" placeholder="LL">
<input id="lp_l" placeholder="L">
</div>

<div class="row">
<input id="lp_h" placeholder="H">
<input id="lp_hh" placeholder="HH">
<input id="lp_hhh" placeholder="HHH">
</div>

<div class="row">
<input id="lp_dev" placeholder="Device Range">
<input id="lp_dev_sn" placeholder="Serial">
<input id="lp_dev_model" placeholder="Model">
</div>

</div>

<!-- ENTRY -->
<div class="card">
<h3>Add Entry</h3>

<div class="row">
<input id="lp_date" type="date">
<input id="lp_tag" placeholder="Tag">
<input id="lp_point" placeholder="Point">
</div>

<div class="row">
<select id="lp_units">
<option>%</option><option>mA</option><option>psi</option>
</select>

<select id="lp_ok">
<option value="YES">PASS</option>
<option value="NO">FAIL</option>
</select>

<input id="lp_notes" placeholder="Notes">
</div>

<div class="row">
<button onclick="loop_add()">+ Add</button>
<button onclick="loop_csv()">Export</button>
<button onclick="loop_clear()">Clear</button>
</div>

<div>
<span id="loop-pass">Pass: 0</span>
<span id="loop-fail">Fail: 0</span>
</div>

</div>

<!-- TABLE -->
<div class="card">
<table id="lp_tbl">
<thead>
<tr>
<th>Date</th><th>Tag</th><th>Point</th><th>Units</th><th>Status</th><th></th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</main>

<script>

const K_LOOP="loopLogs";

function load(){return JSON.parse(localStorage.getItem(K_LOOP)||"[]");}
function save(v){localStorage.setItem(K_LOOP,JSON.stringify(v));}

document.getElementById("lp_date").valueAsDate=new Date();

/* ===== ADD ===== /
function loop_add(){

const rec={
date:lp_date.value||new Date().toISOString().slice(0,10),
tag:lp_tag.value,
point:lp_point.value,
units:lp_units.value,
ok:lp_ok.value,
notes:lp_notes.value,

lrv:lp_lrv.value,
urv:lp_urv.value,
eu:lp_eu_units.value,
lll:lp_lll.value,
ll:lp_ll.value,
l:lp_l.value,
h:lp_h.value,
hh:lp_hh.value,
hhh:lp_hhh.value,
range:lp_dev.value,
serial:lp_dev_sn.value,
model:lp_dev_model.value
};

if(!rec.tag){alert("Enter tag");return;}

const rows=load();
rows.push(rec);
save(rows);
loop_render();
lp_notes.value="";
}

/ ===== RENDER ===== /
function loop_render(){

const rows=load();
const tb=document.querySelector("#lp_tbl tbody");
tb.innerHTML="";

let pass=0,fail=0;

rows.forEach((r,i)=>{

const tr=document.createElement("tr");

tr.innerHTML= <td>${r.date}</td> <td>${r.tag}</td> <td>${r.point}</td> <td>${r.units}</td> <td>${r.ok}</td> <td> <button onclick="toggle(${i},this)">▶</button> <button onclick="loop_delete(${i})">✖</button> </td>;

tb.appendChild(tr);

const d=document.createElement("tr");
d.style.display="none";

d.innerHTML= <td colspan="6"> <div style="font-size:13px;padding:10px;"> <b>Range:</b> ${r.lrv} → ${r.urv} ${r.eu}<br> <b>Alarms:</b> ${r.lll}/${r.ll}/${r.l} → ${r.h}/${r.hh}/${r.hhh}<br> <b>Device:</b> ${r.range}<br> Serial: ${r.serial} | Model: ${r.model} </div> </td>;

tb.appendChild(d);

if(r.ok==="YES")pass++;else fail++;
});

loop-pass.textContent="Pass: "+pass;
loop-fail.textContent="Fail: "+fail;
}

/ ===== TOGGLE ===== /
function toggle(i,btn){
const row=btn.closest("tr").nextElementSibling;
const open=row.style.display==="table-row";
row.style.display=open?"none":"table-row";
btn.textContent=open?"▶":"▼";
}

/ ===== DELETE ===== /
function loop_delete(i){
const rows=load();
rows.splice(i,1);
save(rows);
loop_render();
}

/ ===== CLEAR ===== /
function loop_clear(){
if(confirm("Clear all?")){
save([]);
loop_render();
}
}

/ ===== CSV ===== */
function loop_csv(){

const rows=load();
let csv="Date,Tag,Point,Units,Status,Notes,LRV,URV,EU,LLL,LL,L,H,HH,HHH,Range,Serial,Model\n";

rows.forEach(r=>{
csv+=${r.date},${r.tag},${r.point},${r.units},${r.ok},${r.notes},${r.lrv},${r.urv},${r.eu},${r.lll},${r.ll},${r.l},${r.h},${r.hh},${r.hhh},${r.range},${r.serial},${r.model}\n;
});

const blob=new Blob([csv]);
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="loop_log.csv";
a.click();
}

loop_render();

</script>

</body>
</html>
