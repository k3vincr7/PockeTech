<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PockeTech — Loop Log</title>

<style>
:root{
  --bg:#f6f8fc;
  --fg:#0c1116;
  --muted:#5a6572;
  --tile:#ffffff;
  --border:#d6dbe3;
  --accent:#1f6bff;
  --radius:18px;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:radial-gradient(circle at top,#e9eef7,#f6f8fc);
  color:var(--fg);
}

main{
  padding:14px;
  max-width:900px;
  margin:auto;
}

.card{
  background:var(--tile);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
}

.title{
  font-size:20px;
  font-weight:800;
}

.note{
  background:#eef2f7;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  font-size:14px;
}

input, select, textarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{
  margin-top:10px;
  padding:12px;
  width:100%;
  border-radius:12px;
  border:none;
  background:var(--accent);
  color:white;
  font-weight:600;
}

.secondary{
  background:#dbe3f3;
  color:#000;
}

.row{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
}

.back{
  padding:16px;
  text-align:center;
  border-radius:14px;
  border:1px solid var(--border);
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  border-bottom:1px solid var(--border);
  padding:8px;
  font-size:13px;
}
</style>
</head>

<body>

<main>

<div class="card">
  <div class="title">🔁 Loop Log</div>
  <div class="note">Field → Wiring → I/O → DCS → Final Element</div>
</div>

<!-- QUICK CALC -->
<details class="card">
<summary><strong>⚡ 4–20 mA Quick Calc</strong></summary>

<div class="row">
  <div class="col"><input id="lrv" placeholder="LRV"></div>
  <div class="col"><input id="urv" placeholder="URV"></div>
</div>

<div class="row">
  <div class="col"><input id="pct" placeholder="%"></div>
  <div class="col"><input id="ma" placeholder="mA"></div>
  <div class="col"><input id="eu" placeholder="EU"></div>
</div>

<div class="row">
  <div class="col"><button onclick="fromPct()">From %</button></div>
  <div class="col"><button onclick="fromMa()">From mA</button></div>
</div>

<div class="row">
  <div class="col"><button onclick="step(0)">0%</button></div>
  <div class="col"><button onclick="step(25)">25%</button></div>
  <div class="col"><button onclick="step(50)">50%</button></div>
  <div class="col"><button onclick="step(75)">75%</button></div>
  <div class="col"><button onclick="step(100)">100%</button></div>
</div>

</details>

<!-- LOOP ENTRY -->
<div class="card">

<input id="date" type="date">
<input id="tag" placeholder="Tag">
<input id="point" placeholder="AI / AO / DI / DO">

<div class="row">
  <div class="col"><input id="field" placeholder="Field"></div>
  <div class="col"><input id="dcs" placeholder="DCS"></div>
</div>

<select id="status">
  <option>PASS</option>
  <option>FAIL</option>
</select>

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="addEntry()">+ Add Entry</button>
<button class="secondary" onclick="clearAll()">Clear All</button>

</div>

<!-- TABLE -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Date</th><th>Tag</th><th>Point</th><th>Field</th><th>DCS</th><th>Status</th>
      </tr>
    </thead>
    <tbody id="log"></tbody>
  </table>
</div>

<div class="back" onclick="location.href='./index.html'">
  ← Back
</div>

</main>

<script>

document.getElementById("date").valueAsDate = new Date();

let logs = JSON.parse(localStorage.getItem("loopLogs")||"[]");

function save(){localStorage.setItem("loopLogs",JSON.stringify(logs));}

function render(){
  const t=document.getElementById("log");
  t.innerHTML="";
  logs.forEach(l=>{
    t.innerHTML+=<tr>     <td>${l.date}</td>     <td>${l.tag}</td>     <td>${l.point}</td>     <td>${l.field}</td>     <td>${l.dcs}</td>     <td>${l.status}</td>     </tr>;
  });
}

function addEntry(){
  const entry={
    date:date.value,
    tag:tag.value,
    point:point.value,
    field:field.value,
    dcs:dcs.value,
    status:status.value
  };
  logs.push(entry);
  save();
  render();
}

function clearAll(){
  logs=[];
  save();
  render();
}

/* ===== CALC ===== */

function fromPct(){
  let p=parseFloat(pct.value);
  ma.value=4+(p/100)*16;
  autoFill();
}

function fromMa(){
  let m=parseFloat(ma.value);
  pct.value=((m-4)/16)100;
  autoFill();
}

function step(v){
  pct.value=v;
  fromPct();
}

/ AUTO FILL INTO LOG */
function autoFill(){
  field.value = ma.value + " mA";
  dcs.value = pct.value + " %";
}

render();

</script>

</body>
</html>
