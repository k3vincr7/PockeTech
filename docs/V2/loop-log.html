<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PockeTech — Loop Log</title>

<style>
/* MINIMAL SAFE STYLES (won’t fight your app) /
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f6f8fc;
  color:#0c1116;
}

main{
  padding:14px;
  max-width:600px;
  margin:auto;
}

.card{
  background:#fff;
  border:1px solid #d6dbe3;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}

.title{
  font-size:18px;
  font-weight:700;
}

.muted{
  font-size:13px;
  color:#666;
  margin-top:4px;
}

/ INPUTS /
input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #d6dbe3;
  font-size:14px;
  margin-top:10px;
  box-sizing:border-box;
}

/ BUTTONS /
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#2d6cdf;
  color:white;
  font-weight:600;
}

.secondary{
  background:#e5e9f2;
  color:#000;
}

/ STEP BUTTONS /
.steps{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.steps button{
  flex:1;
  padding:10px;
  border-radius:10px;
}

/ TABLE /
table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td{
  padding:6px;
  font-size:12px;
  border-bottom:1px solid #eee;
  text-align:left;
}

/ BACK /
.back{
  text-align:center;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<main>

<!-- HEADER -->
<div class="card">
  <div class="title">🔁 Loop Log</div>
  <div class="muted">Field → Wiring → I/O → DCS → Final Element</div>
</div>

<!-- QUICK CALC -->
<div class="card">
  <div class="title">⚡ 4–20 mA Quick Calc</div>

  <input id="pct" placeholder="%">
  <input id="ma" placeholder="mA">

  <div class="steps">
    <button onclick="step(0)">0%</button>
    <button onclick="step(25)">25%</button>
    <button onclick="step(50)">50%</button>
    <button onclick="step(75)">75%</button>
    <button onclick="step(100)">100%</button>
  </div>
</div>

<!-- ENTRY -->
<div class="card">

  <input id="date" type="date">
  <input id="tag" placeholder="Tag (PT-101)">

  <input id="output" placeholder="Output (what you send)">
  <input id="indicated" placeholder="Indicated (what system reads)">

  <select id="status">
    <option>PASS</option>
    <option>FAIL</option>
  </select>

  <textarea id="notes" placeholder="Notes"></textarea>

  <button onclick="addEntry()">+ Add Entry</button>
  <button class="secondary" onclick="clearAll()">Clear All</button>

</div>

<!-- TABLE -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Tag</th>
        <th>Out</th>
        <th>Ind</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="log"></tbody>
  </table>
</div>

<!-- BACK -->
<div class="card back" onclick="location.href='./index.html'">
  ← Back
</div>

</main>

<script>

/ AUTO DATE /
document.getElementById("date").valueAsDate = new Date();

/ STORAGE /
let logs = JSON.parse(localStorage.getItem("loopLogs") || "[]");

function save(){
  localStorage.setItem("loopLogs", JSON.stringify(logs));
}

/ RENDER /
function render(){
  const table = document.getElementById("log");
  table.innerHTML = "";

  logs.forEach(l=>{
    table.innerHTML +=       <tr>         <td>${l.date}</td>         <td>${l.tag}</td>         <td>${l.output}</td>         <td>${l.indicated}</td>         <td>${l.status}</td>       </tr>    ;
  });
}

/ ADD ENTRY /
function addEntry(){
  const entry = {
    date: document.getElementById("date").value,
    tag: document.getElementById("tag").value,
    output: document.getElementById("output").value,
    indicated: document.getElementById("indicated").value,
    status: document.getElementById("status").value
  };

  if(!entry.tag){
    alert("Enter tag");
    return;
  }

  logs.push(entry);
  save();
  render();

  document.getElementById("tag").value="";
  document.getElementById("output").value="";
  document.getElementById("indicated").value="";
  document.getElementById("notes").value="";
}

/ CLEAR /
function clearAll(){
  if(confirm("Clear all logs?")){
    logs=[];
    save();
    render();
  }
}

/ CALC + AUTO FILL */
function step(p){
  document.getElementById("pct").value = p;

  const m = 4 + (p/100)*16;
  document.getElementById("ma").value = m.toFixed(2);

  document.getElementById("output").value = m.toFixed(2) + " mA";
  document.getElementById("indicated").value = p + " %";
}

render();

</script>

</body>
</html>
