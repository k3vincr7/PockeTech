<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Log</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#eef2f7;
}

.header{
  background:#0f3c78;
  color:white;
  padding:16px;
  font-weight:700;
}

.container{
  max-width:900px;
  margin:auto;
  padding:14px;
}

.card{
  background:white;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.06);
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.grid-2{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.btn{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.blue{background:#1f6bff;color:white;}
.green{background:#28a745;color:white;}
.red{background:#dc3545;color:white;}
.gray{background:#e0e0e0;}

.row{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.active{
  outline:3px solid #00000030;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#0f3c78;
  color:white;
  padding:10px;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-weight:600;
}

.pass{background:#d4edda;color:#155724;}
.fail{background:#f8d7da;color:#721c24;}

.details{
  background:#f9fbff;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">🔁 LOOP LOG</div>

<div class="container">

<div class="card">
<h3>📊 Snapshot</h3>
<div class="grid">
<input id="lrv" placeholder="LRV">
<input id="urv" placeholder="URV">
<input id="eu" placeholder="EU">
</div>
</div>

<div class="card">
<h3 id="formTitle">➕ Add Entry</h3>

<div class="grid-2">
<input id="date" type="date">
<input id="tag" placeholder="Tag">
</div>

<div class="grid-2">
<input id="point" placeholder="Point">
<input id="notes" placeholder="Notes">
</div>

<div class="row">
<button id="passBtn" class="btn green active">PASS</button>
<button id="failBtn" class="btn red">FAIL</button>
</div>

<div class="row">
<button id="submitBtn" class="btn blue">+ ADD TO LOG</button>
</div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Date</th>
<th>Tag</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>
</div>

</div>

<script>

const el = id => document.getElementById(id);

el("date").valueAsDate = new Date();

let logs = JSON.parse(localStorage.getItem("loopLogs")||"[]");
let currentStatus = "PASS";
let editIndex = null;

const passBtn = el("passBtn");
const failBtn = el("failBtn");

passBtn.onclick = () => setStatus("PASS");
failBtn.onclick = () => setStatus("FAIL");
el("submitBtn").onclick = add;

function setStatus(s){
  currentStatus = s;
  passBtn.classList.toggle("active", s==="PASS");
  failBtn.classList.toggle("active", s==="FAIL");
}

function save(){
  localStorage.setItem("loopLogs", JSON.stringify(logs));
}

function add(){

  const tag = el("tag").value;

  if(!tag){
    alert("Enter tag");
    return;
  }

  const entry = {
    date: el("date").value,
    tag,
    point: el("point").value,
    status: currentStatus,
    notes: el("notes").value
  };

  if(editIndex !== null){
    logs[editIndex] = entry;
    editIndex = null;
  } else {
    logs.push(entry);
  }

  save();
  render();
}

function render(){

  const tb = el("log");
  tb.innerHTML = "";

  logs.forEach((r,i)=>{

    const tr = document.createElement("tr");

    tr.innerHTML =       <td>${r.date}</td>       <td>${r.tag}</td>       <td><span class="badge ${r.status==='PASS'?'pass':'fail'}">${r.status}</span></td>       <td>         <button onclick="edit(${i})">✏️</button>         <button onclick="del(${i})">🗑️</button>       </td>    ;

    tb.appendChild(tr);
  });
}

function edit(i){
  const r = logs[i];
  el("tag").value = r.tag;
  el("notes").value = r.notes;
  setStatus(r.status);
  editIndex = i;
}

function del(i){
  logs.splice(i,1);
  save();
  render();
}

render();

</script>

</body>
</html
