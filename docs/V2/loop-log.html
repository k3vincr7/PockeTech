<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PockeTech — Loop Log</title>

<style>
:root{
  --bg:#f6f8fc;
  --fg:#0c1116;
  --muted:#5a6572;
  --tile:#ffffff;
  --border:#d6dbe3;
  --accent:#2d6cdf;
  --radius:16px;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:var(--bg);
  color:var(--fg);
}

main{
  padding:14px;
  max-width:900px;
  margin:auto;
}

/* CARDS /
.card{
  background:var(--tile);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
}

.title{
  font-size:20px;
  font-weight:800;
}

.note{
  background:#eef2f7;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  font-size:14px;
}

/ GRID FIX (THIS FIXES YOUR LAYOUT ISSUE) /
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.full{
  grid-column:1 / -1;
}

/ INPUTS /
input, select, textarea{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:14px;
  box-sizing:border-box;
}

/ BUTTONS /
button{
  padding:14px;
  width:100%;
  border-radius:12px;
  border:none;
  background:var(--accent);
  color:white;
  font-weight:600;
}

.secondary{
  background:#dbe3f3;
  color:#000;
}

/ TABLE /
table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  border-bottom:1px solid var(--border);
  padding:8px;
  font-size:13px;
  text-align:left;
}

.back{
  padding:16px;
  text-align:center;
  border-radius:14px;
  border:1px solid var(--border);
}
</style>
</head>

<body>

<main>

<div class="card">
  <div class="title">🔁 Loop Log</div>
  <div class="note">Field → Wiring → I/O → DCS → Final Element</div>
</div>

<!-- QUICK CALC -->
<details class="card">
<summary><strong>⚡ 4–20 mA Quick Calc</strong></summary>

<div class="grid">
  <input id="lrv" placeholder="LRV">
  <input id="urv" placeholder="URV">

  <input id="pct" placeholder="%">
  <input id="ma" placeholder="mA">
  <input id="eu" placeholder="EU" class="full">
</div>

<div class="grid" style="margin-top:10px">
  <button onclick="fromPct()">From %</button>
  <button onclick="fromMa()">From mA</button>
</div>

<div class="grid" style="margin-top:10px">
  <button onclick="step(0)">0%</button>
  <button onclick="step(25)">25%</button>
  <button onclick="step(50)">50%</button>
  <button onclick="step(75)">75%</button>
  <button onclick="step(100)">100%</button>
</div>

</details>

<!-- ENTRY -->
<div class="card">

<div class="grid">
  <input id="date" type="date" class="full">
  <input id="tag" placeholder="Tag (PT-101)" class="full">

  <input id="field" placeholder="Output (what you send)">
  <input id="dcs" placeholder="Indicated (what system reads)">

  <select id="status" class="full">
    <option>PASS</option>
    <option>FAIL</option>
  </select>

  <textarea id="notes" placeholder="Notes" class="full"></textarea>
</div>

<div class="grid" style="margin-top:10px">
  <button onclick="addEntry()">+ Add Entry</button>
  <button class="secondary" onclick="clearAll()">Clear All</button>
</div>

</div>

<!-- TABLE -->
<div class="card">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Tag</th>
        <th>Output</th>
        <th>Indicated</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="log"></tbody>
  </table>
</div>

<div class="back" onclick="location.href='./index.html'">
  ← Back
</div>

</main>

<script>

// AUTO DATE
document.getElementById("date").valueAsDate = new Date();

// STORAGE
let logs = JSON.parse(localStorage.getItem("loopLogs") || "[]");

function save(){
  localStorage.setItem("loopLogs", JSON.stringify(logs));
}

// RENDER TABLE
function render(){
  const table = document.getElementById("log");
  table.innerHTML = "";

  logs.forEach(l=>{
    table.innerHTML +=       <tr>         <td>${l.date}</td>         <td>${l.tag}</td>         <td>${l.output}</td>         <td>${l.indicated}</td>         <td>${l.status}</td>       </tr>    ;
  });
}

// ADD ENTRY
function addEntry(){
  const entry = {
    date: document.getElementById("date").value,
    tag: document.getElementById("tag").value,
    output: document.getElementById("field").value,
    indicated: document.getElementById("dcs").value,
    status: document.getElementById("status").value
  };

  if(!entry.tag){
    alert("Enter a tag");
    return;
  }

  logs.push(entry);
  save();
  render();

  document.getElementById("tag").value = "";
  document.getElementById("field").value = "";
  document.getElementById("dcs").value = "";
  document.getElementById("notes").value = "";
}

// CLEAR
function clearAll(){
  if(confirm("Clear all logs?")){
    logs = [];
    save();
    render();
  }
}

/ CALC */

function fromPct(){
  const p = parseFloat(document.getElementById("pct").value);
  if(isNaN(p)) return;

  const m = 4 + (p/100)*16;
  document.getElementById("ma").value = m.toFixed(2);

  autoFill();
}

function fromMa(){
  const m = parseFloat(document.getElementById("ma").value);
  if(isNaN(m)) return;

  const p = ((m-4)/16)100;
  document.getElementById("pct").value = p.toFixed(1);

  autoFill();
}

function step(v){
  document.getElementById("pct").value = v;
  fromPct();
}

/ AUTO FILL */
function autoFill(){
  const ma = document.getElementById("ma").value;
  const pct = document.getElementById("pct").value;

  if(ma){
    document.getElementById("field").value = ma + " mA";
  }

  if(pct){
    document.getElementById("dcs").value = pct + " %";
  }
}

render();

</script>

</body>
</html>
