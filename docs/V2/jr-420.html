<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PockeTech — 4–20 mA Guide</title>
<style>
:root{--bg:#f6f8fc;--fg:#0c1116;--muted:#5a6572;--card:#fff;--tile:#eef2f7;--border:#d6dbe3;--accent:#1f6bff}
html[data-theme="dark"]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--card:#151922;--tile:#202838;--border:#2a2f3a;--accent:#3a7afe}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:var(--bg);color:var(--fg)}
main{padding:14px;max-width:900px;margin:auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.title{font-size:20px;font-weight:800}
.muted{color:var(--muted)}
.tap{cursor:pointer}
.info{margin-top:10px;padding:10px;border-radius:12px;background:var(--tile);border:1px solid var(--border)}
svg{width:100%;margin-top:10px}
</style>
</head>
<body>
<main>

<div class="card">
  <div class="title">📈 Interactive Loop Diagram</div>
  <p class="muted">Tap each component to learn what it does.</p>

  <svg viewBox="0 0 400 180">
    <rect class="tap" onclick="showInfo('power')" x="10" y="60" width="80" height="60" stroke="currentColor" fill="none"/>
    <text x="20" y="95">24V</text>

    <rect class="tap" onclick="showInfo('tx')" x="130" y="20" width="100" height="60" stroke="currentColor" fill="none"/>
    <text x="150" y="55">TX</text>

    <rect class="tap" onclick="showInfo('plc')" x="280" y="60" width="100" height="60" stroke="currentColor" fill="none"/>
    <text x="300" y="95">PLC</text>

    <line x1="90" y1="90" x2="130" y2="50" stroke="currentColor"/>
    <line x1="230" y1="50" x2="280" y2="90" stroke="currentColor"/>
    <line x1="280" y1="120" x2="90" y2="120" stroke="currentColor"/>
  </svg>

  <div id="infoBox" class="info">Tap something above 👆</div>
</div>

<script>
function showInfo(type){
  const box=document.getElementById('infoBox');
  if(type==='power') box.innerHTML='🔋 Supplies 24V to drive the loop current.';
  if(type==='tx') box.innerHTML='🎛️ Transmitter controls the 4–20 mA signal based on measurement.';
  if(type==='plc') box.innerHTML='🧠 PLC reads the current and converts it into a value.';
}
</script>

</main>
</body>
</html>
