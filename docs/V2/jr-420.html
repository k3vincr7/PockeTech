<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PockeTech — 4–20 mA Basics</title>

<style>
:root{
  --bg:#f6f8fc;
  --fg:#0c1116;
  --muted:#5a6572;
  --tile:#ffffff;
  --border:#d6dbe3;
  --radius:18px;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:radial-gradient(circle at top,#e9eef7,#f6f8fc 50%);
  color:var(--fg);
}

main{
  padding:14px;
  max-width:960px;
  margin:auto;
}

.card{
  background:var(--tile);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
}

.title{
  font-size:22px;
  font-weight:800;
}

.subtitle{
  color:var(--muted);
  margin-top:4px;
}

svg{
  width:100%;
  margin-top:10px;
}

.label{
  font-size:12px;
  fill:#0c1116;
}

.note{
  margin-top:10px;
  padding:12px;
  border-radius:12px;
  background:#eef2f7;
  font-size:14px;
}

ul{
  padding-left:18px;
}

.back{
  padding:16px;
  border-radius:18px;
  background:var(--tile);
  border:1px solid var(--border);
  text-align:center;
  font-weight:600;
}
</style>
</head>

<body>

<main>

<div class="card">
  <div class="title">📈 4–20 mA Basics</div>
  <div class="subtitle">Simple, real-world explanation</div>
</div>

<div class="card">
  <div class="title">What is 4–20 mA?</div>
  <ul>
    <li>4 mA = 0%</li>
    <li>20 mA = 100%</li>
  </ul>
</div>

<div class="card">
  <div class="title">Loop Diagram</div>

  <svg viewBox="0 0 420 220">

    <!-- POWER -->
    <rect x="10" y="80" width="100" height="70" stroke="#0c1116" fill="none"/>
    <text x="20" y="105" class="label">24V DC</text>

    <!-- TX -->
    <rect x="160" y="30" width="120" height="70" stroke="#0c1116" fill="none"/>
    <text x="175" y="60" class="label">TX</text>

    <!-- PLC -->
    <rect x="300" y="80" width="110" height="70" stroke="#0c1116" fill="none"/>
    <text x="315" y="110" class="label">PLC</text>

    <!-- LINES -->
    <line x1="110" y1="95" x2="160" y2="50" stroke="#0c1116"/>
    <line x1="280" y1="50" x2="300" y2="95" stroke="#0c1116"/>
    <line x1="300" y1="145" x2="110" y2="145" stroke="#0c1116"/>

  </svg>

  <div class="note">
    Power → Transmitter → PLC → Return  
  </div>

</div>

<div class="card">
  <div class="title">Example</div>
  <ul>
    <li>4 mA → 0 psi</li>
    <li>12 mA → 50 psi</li>
    <li>20 mA → 100 psi</li>
  </ul>
</div>

<div class="card">
  <div class="title">Formula</div>
  <p>% = (mA - 4) / 16 × 100</p>
</div>

<div class="back" onclick="location.href='./jrtech.html'">
  ← Back
</div>

</main>

</body>
</html>
