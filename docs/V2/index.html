<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"><title>PockeTech V2</title><meta name="theme-color" content="#0f1115">
<style>
:root{--bg:#f6f8fc;--fg:#0c1116;--muted:#5a6572;--card:#fff;--tile:#eef2f7;--border:#d6dbe3;--accent:#1f6bff;--ok:#166534;--shadow:0 12px 30px rgba(15,23,42,.10);--radius:18px}html[data-theme="dark"]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--card:#151922;--tile:#202838;--border:#2a2f3a;--accent:#3a7afe;--shadow:0 14px 34px rgba(0,0,0,.35)}@media(prefers-color-scheme:dark){html[data-theme="auto"]{--bg:#0f1115;--fg:#e8e8e8;--muted:#a0a0a0;--card:#151922;--tile:#202838;--border:#2a2f3a;--accent:#3a7afe;--shadow:0 14px 34px rgba(0,0,0,.35)}}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top,var(--tile),var(--bg) 42%);color:var(--fg);min-height:100vh}header{background:rgba(255,255,255,.72);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:calc(10px + env(safe-area-inset-top)) 12px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}html[data-theme="dark"] header{background:rgba(15,17,21,.75)}.header-left{display:flex;align-items:center;gap:8px}.brand{display:flex;flex-direction:column}.header-title{font-weight:800;font-size:18px}.build{font-size:12px;color:var(--muted)}main{padding:14px;max-width:960px;margin:0 auto}.section-title{margin:0 0 6px;font-size:30px;letter-spacing:-.5px}.subtitle{margin:0;color:var(--muted);line-height:1.35}button,input,select{font:inherit;border-radius:14px}button{cursor:pointer;border:1px solid var(--border);background:var(--tile);color:var(--fg);padding:12px;font-weight:650;transition:transform .08s ease,box-shadow .15s ease,border-color .15s ease}button:active{transform:translateY(1px) scale(.99)}input,select{width:100%;padding:13px;border:1px solid var(--border);background:var(--card);color:var(--fg);margin-top:7px;outline:none}input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 20%,transparent)}input[type="range"]{accent-color:var(--accent);padding:0;border:none;background:transparent;margin-top:10px}label{font-weight:700;font-size:14px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}.hero{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 28%,var(--card)),var(--card) 70%);overflow:hidden;position:relative}.hero:after{content:'';position:absolute;right:-55px;top:-60px;width:150px;height:150px;border-radius:999px;background:color-mix(in srgb,var(--accent) 18%,transparent)}.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.tile{min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;background:var(--tile);border:1px solid var(--border);border-radius:18px;font-size:22px;box-shadow:0 4px 12px rgba(0,0,0,.04);transition:transform .12s ease,box-shadow .15s ease}.tile.active-tile{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,var(--tile)),var(--tile));border-color:color-mix(in srgb,var(--accent) 55%,var(--border))}.tile.active-tile:hover{transform:translateY(-2px);box-shadow:0 8px 24px color-mix(in srgb,var(--accent) 22%,transparent)}.tile .emoji{font-size:30px;line-height:1}.tile .name{font-size:15px;font-weight:750;line-height:1.1;text-align:center}.tile.disabled{opacity:.42}.group-label{font-size:11px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;padding:0 2px}.hero-badge{display:inline-block;background:var(--accent);color:#fff;font-size:11px;font-weight:800;letter-spacing:.06em;padding:3px 10px;border-radius:999px;margin-bottom:10px}.row{display:flex;gap:12px;flex-wrap:wrap}.col{flex:1 1 230px}.muted{color:var(--muted);font-size:13px;line-height:1.35}.big{font-size:28px;font-weight:850;margin:4px 0;letter-spacing:-.4px}.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}.result-card{background:var(--tile);border:1px solid var(--border);border-radius:16px;padding:14px}.ok{background:var(--ok);border-color:var(--ok);color:white}.small-btn{padding:8px 10px;font-size:14px;border-radius:12px;width:auto}.back-btn{display:none}.hr{height:1px;background:var(--border);margin:14px 0}.chipbar{display:flex;gap:8px;flex-wrap:wrap}.chip{width:auto;border-radius:999px;padding:9px 13px}.slider-wrap{background:var(--tile);border:1px solid var(--border);border-radius:16px;padding:14px;margin-top:14px}table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px;overflow:hidden;border-radius:12px}th,td{border:1px solid var(--border);padding:9px;text-align:left}th{background:var(--tile)}.scroll-x{overflow-x:auto}.toggle-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.switch{width:auto;transform:scale(1.15);margin:0}section{display:none;animation:fadeIn .16s ease}section.active{display:block}@keyframes fadeIn{from{opacity:.35;transform:translateY(4px)}to{opacity:1;transform:none}}footer{text-align:center;color:var(--muted);font-size:13px;padding:22px}@media(max-width:520px){main{padding:12px}.section-title{font-size:28px}.home-grid{gap:9px}.tile{min-height:94px;border-radius:16px}.tile .name{font-size:14px}.tile .emoji{font-size:26px}.card{padding:14px}.big{font-size:24px}}
